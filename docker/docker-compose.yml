version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: pix-timescaledb
    environment:
      POSTGRES_DB: antifraude
      POSTGRES_USER: antifraude
      POSTGRES_PASSWORD: antifraude
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antifraude -d antifraude"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - timescale_data:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.12
    container_name: pix-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "9092:9092"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: pix-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://antifraude:antifraude@timescaledb:5432/antifraude
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      timescaledb:
        condition: service_healthy
      redpanda:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../data:/app/data

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: pix-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://antifraude:antifraude@timescaledb:5432/antifraude
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      timescaledb:
        condition: service_healthy
      redpanda:
        condition: service_started
    volumes:
      - ../models:/app/models
      - ../data:/app/data

  simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: pix-simulator
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://antifraude:antifraude@timescaledb:5432/antifraude
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    command: ["python", "-m", "src.pix.streaming.simulator", "--tps", "20", "--duration", "120", "--fraud-ratio", "0.12"]
    depends_on:
      redpanda:
        condition: service_started
    profiles:
      - simulator

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: pix-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pix-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/pix-fraud-realtime.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  timescale_data:
  prometheus_data:
  grafana_data:
